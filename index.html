<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de adivinhação</title>
</head>
<body>
    <header>
        <h1>Jogo de adivinhação!</h1>
        <p>Bem vindo ao jogo de adivinhação, há o número misterioso aqui de 1 a 100, você haverá 10 chances para advivinhar qual é o número misteirioso, boa sorte!</p>
    </header>

    <div class="container">
        <div class="input-area">
            <input type="number" id="input-palpite" min="1" max="100" placeholder="Digite um número..." />
            <button id="btn-adivinhar">Tentar</button>
        </div>
    </div>

    <div id="mensagem"></div>

    <div class="tentativas-info">
        <span id="tentativas-restantes">10 tentativas restantes</span>
        <span id="intervalo">Intervalo: 1 – 100</span>
    </div>

    <div class="barra-progresso">
        <div class="barra-progresso-fill" id="barra"></div>
    </div>

    <div class="historico">
        <h3>Seus palpites</h3>
        <div class="historico-lista" id="historico-lista"></div>
    </div>

    <button class="btn-reiniciar">Reiniciar jogo</button>
    
    <script src="script.js"></script>
</body>
</html>
